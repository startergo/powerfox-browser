name: Build PowerFox (startergo fork)

# Self-hosted CI on startergo/powerfox-browser.
# Targets Mac OS X 10.6 x86_64 only. Skips the private Jazzzny/powerfox-sdk,
# the PPC toolchain, FFmpeg, and the Snow Leopard libc++ fix script — none of
# them are needed to produce a testable 10.6 x86_64 PowerFox.app for the
# WebGL/GL fix in platform/gfx/gl/GLContext.cpp.

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-powerfox:
    runs-on: macos-26
    name: Build PowerFox 10.6 x86_64
    permissions:
      contents: read

    steps:
      - name: Checkout PowerFox superproject
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install yasm nasm llvm@16

      - name: Configure clang-16
        run: |
          # Xcode 26.5's clang (LLVM ~19) rejects the 10.6 SDK's SecKeychain.h
          # AUTH_TYPE_FIX_ macro as "expression is not an integral constant
          # expression" because of stricter C99+ enforcement on multi-char
          # constants like 'ntlm'. The upstream PowerFox build wiki recommends
          # clang-16 (LLVM 16) from MacPorts, which is permissive enough.
          # Homebrew's llvm@16 is the equivalent.
          echo "CLANG16=/opt/homebrew/opt/llvm@16/bin/clang" >> "$GITHUB_ENV"
          echo "CLANGXX16=/opt/homebrew/opt/llvm@16/bin/clang++" >> "$GITHUB_ENV"
          /opt/homebrew/opt/llvm@16/bin/clang --version | head -2

      - name: Install Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Fetch MacOSX10.6.sdk
        id: sdk
        run: |
          set -e
          # The macos-26 runner ships Xcode 26's SDK, which has removed
          # legacy Carbon/Quickdraw/HIView headers entirely. Building
          # PowerFox for a 10.6 deployment target against that SDK fails
          # on every file that uses Cursor/HIView/WindowDef/etc. Fetch
          # the real 10.6 SDK from phracker/MacOSX-SDKs instead.
          SDK_ROOT="$HOME/MacOSX-SDKs"
          rm -rf "$SDK_ROOT"
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/phracker/MacOSX-SDKs.git "$SDK_ROOT"
          cd "$SDK_ROOT"
          git sparse-checkout set MacOSX10.6.sdk
          SDK_PATH="$SDK_ROOT/MacOSX10.6.sdk"
          if [ ! -d "$SDK_PATH" ]; then
            echo "##[error]MacOSX10.6.sdk not found after sparse-checkout"
            exit 1
          fi

          # The 10.6 SDK only ships libstdc++ (GCC 4.0.1) headers, not
          # libc++. Modern Xcode toolchains put libc++ headers either in
          # the toolchain or the macOS SDK bundle. Find them and symlink
          # into the 10.6 SDK so `-stdlib=libc++ -isysroot <10.6sdk>` can
          # locate <new>, <vector>, etc.
          LIBCXX_HDRS=""
          for candidate in \
            "$(xcrun --show-toolchain-path 2>/dev/null)/usr/include/c++/v1" \
            "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/include/c++/v1" \
            /Applications/Xcode*.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/include/c++/v1 \
            "$(xcrun --sdk macosx --show-sdk-path)/usr/include/c++/v1"; do
            if [ -n "$candidate" ] && [ -f "$candidate/new" ]; then
              LIBCXX_HDRS="$candidate"
              break
            fi
          done
          if [ -z "$LIBCXX_HDRS" ]; then
            echo "##[error]Could not locate libc++ headers on runner"
            find /Applications -maxdepth 8 -type d -name 'v1' -path '*c++*' 2>/dev/null | head -5
            exit 1
          fi
          echo "libc++ headers at $LIBCXX_HDRS"
          mkdir -p "$SDK_PATH/usr/include/c++"
          if [ ! -e "$SDK_PATH/usr/include/c++/v1" ]; then
            ln -s "$LIBCXX_HDRS" "$SDK_PATH/usr/include/c++/v1"
          fi

          echo "Using 10.6 SDK at $SDK_PATH"
          echo "sdk_path=$SDK_PATH" >> "$GITHUB_OUTPUT"

      - name: Overlay runtime objects
        run: |
          set -e
          # phracker/MacOSX-SDKs omits binary .o files (crt1.o, dylib1.o,
          # etc.). Without them, ld fails with "library 'crt1.10.6.o' not
          # found". Overlay them from a small release asset on this fork.
          curl -fsSL -o /tmp/runtime-objects.tar.gz \
            https://github.com/startergo/powerfox-browser/releases/download/sdk-runtime-objects-10.6/MacOSX10.6.sdk-runtime-objects.tar.gz
          tar -xzf /tmp/runtime-objects.tar.gz -C "${{ steps.sdk.outputs.sdk_path }}"
          echo "Runtime objects installed:"
          ls -la "${{ steps.sdk.outputs.sdk_path }}/usr/lib/"*.o | head -10

          # Compat declarations for 10.6-private functions (memmem,
          # strndup, arc4random_buf, etc.) that exist in libSystem but
          # aren't declared in the SDK headers. Append them to the SDK's
          # own <string.h> and <stdlib.h> so only code that actually
          # includes those headers sees the declarations (force-including
          # via CC/CXX wrapper pollutes preprocessor-only output and
          # breaks Python scripts that eval() clang -E output, e.g.
          # GenerateCSSPropsGenerated.py).
          SDK="${{ steps.sdk.outputs.sdk_path }}"
          # Note: do NOT add prototypes for strndup/memmem/arc4random_buf/
          # arc4random/__sincos to the SDK headers. Configure's AC_CHECK_FUNCS
          # detects them by linking against the build host's libSystem (macOS
          # 26), but they don't exist in 10.6's libSystem at runtime, causing
          # dyld to abort with "Symbol not found: _strndup". Instead, override
          # the configure cache variables via the mozconfig (below) to tell
          # UXP/expat these functions don't exist, so they use their own
          # fallbacks (manual implementation or /dev/urandom).

      - name: Write .mozconfig
        run: |
          cat > .mozconfig <<EOF
          TARGET_CPU=x86_64
          CC="$CLANG16 -arch \$TARGET_CPU"
          CXX="$CLANGXX16 -stdlib=libc++ -arch \$TARGET_CPU"

          export HOST_CC="$CLANG16 -arch \$TARGET_CPU"
          export HOST_CXX="$CLANGXX16 -stdlib=libc++ -arch \$TARGET_CPU"

          RANLIB=ranlib
          AR=ar
          AS=\$CC
          LD=ld
          STRIP=strip
          OTOOL=otool
          export CC CXX HOST_CC HOST_CXX RANLIB AR AS LD STRIP OTOOL

          ac_add_options --target=x86_64-apple-darwin10.8.0
          ac_add_options --host=x86_64-apple-darwin
          ac_add_options --enable-macos-target=10.6
          ac_add_options --with-macos-sdk=${{ steps.sdk.outputs.sdk_path }}
          ac_add_options --enable-application=basilisk
          # CoreMedia/VideoToolbox is a 10.7+ public framework. On 10.6
          # it's private and lacks headers; rather than weak-link a
          # framework that won't be available at runtime anyway, disable
          # the Apple media platform entirely. Media decode falls back to
          # libvpx (VP8/VP9) and libavcodec (H.264 via the
          # powerfox-ffmpeg-enabler dylibs), which is what users actually
          # need on a 10.6 box.
          ac_add_options --disable-apple-media
          # WebRTC's mac video_capture uses AVFoundation/AVFoundation.h
          # (10.7+). Disable WebRTC entirely for this test build - it's
          # not needed to validate the WebGL/GL fix, and the qtkit
          # alternative would need its own bring-up.
          ac_add_options --disable-webrtc
          ac_add_options --disable-tests
          ac_add_options --enable-optimize=-O2
          ac_add_options --disable-debug
          ac_add_options --disable-crashreporter
          ac_add_options --disable-necko-wifi
          ac_add_options --disable-safe-browsing

          export MOZ_TELEMETRY_REPORTING=0
          export MOZ_ADDON_SIGNING=0
          export MOZ_REQUIRE_SIGNING=0

          # Override AC_CHECK_FUNCS results: configure links against the
          # build-host libSystem (macOS 26) and finds these 10.7+ functions,
          # but 10.6's runtime libSystem doesn't have them, causing dyld
          # load failures. Force "not found" so UXP/expat use their own
          # fallbacks (manual impl for strndup/memmem, /dev/urandom for
          # arc4random*, separate sin+cos calls for __sincos).
          export ac_cv_func_strndup=no
          export ac_cv_func_memmem=no
          export ac_cv_func_arc4random=no
          export ac_cv_func_arc4random_buf=no
          export ac_cv_func___sincos=no
          export ac_cv_func_sincos=no
          EOF
          echo "===== .mozconfig ====="
          cat .mozconfig

      - name: Build
        env:
          # Run mach under Rosetta so host arch (x86_64) matches the target
          # arch. Without this, UXP's configure infers the host triple as
          # "arm-apple-darwin..." from the arm64 runner and clang falls back
          # to -arch armv4t, which the linker rejects.
          MACH_BUILD_PYTHON_NATIVE: "1"
        run: |
          arch -x86_64 ./mach build
          arch -x86_64 ./mach package
          echo "BASILISK_VERSION=nightly-$(git rev-parse --short HEAD)-$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Package PowerFox.app
        run: |
          # mach package produces Nightly.app (build-time name) and a .dmg
          # under obj-*/dist/. Find whatever's there and upload both.
          DIST_DIR="$(find obj-* -maxdepth 2 -type d -name 'dist' 2>/dev/null | head -1)"
          if [ -z "$DIST_DIR" ]; then
            echo "##[error]No obj-*/dist directory found"
            ls -la obj-* 2>&1 | head -20
            exit 1
          fi
          echo "Dist dir: $DIST_DIR"
          ls -la "$DIST_DIR" | head -25

          # Locate the .app bundle (named either PowerFox.app or Nightly.app)
          APP_SRC="$(find "$DIST_DIR" -maxdepth 3 -type d -name '*.app' 2>/dev/null | head -1)"
          if [ -z "$APP_SRC" ]; then
            echo "##[error]No .app bundle found in $DIST_DIR"
            exit 1
          fi
          APP_NAME="$(basename "$APP_SRC")"
          echo "Found app: $APP_SRC (name: $APP_NAME)"

          # On 10.6, CoreText is a sub-framework of ApplicationServices, not
          # a top-level framework. The linker (ld64) doesn't honor -isysroot
          # for framework search and falls back to the build host's macOS 26
          # SDK, which has CoreText at top-level. Result: binaries reference
          # /System/Library/Frameworks/CoreText.framework/... which doesn't
          # exist on 10.6, causing dyld to fail loading XUL. Rewrite the
          # path in every Mach-O inside the .app bundle to the correct
          # 10.6 sub-framework location.
          OLD="/System/Library/Frameworks/CoreText.framework/Versions/A/CoreText"
          NEW="/System/Library/Frameworks/ApplicationServices.framework/Versions/A/Frameworks/CoreText.framework/Versions/A/CoreText"
          echo "Rewriting CoreText load paths..."
          find "$APP_SRC/Contents/MacOS" -type f \( -name "*.dylib" -o -name "powerfox" -o -perm +111 \) | while read -r bin; do
            if file "$bin" 2>/dev/null | grep -q "Mach-O"; then
              if otool -L "$bin" 2>/dev/null | grep -q "$OLD"; then
                install_name_tool -change "$OLD" "$NEW" "$bin"
                echo "  fixed: $bin"
              fi
            fi
          done

          cp -R "$APP_SRC" "./PowerFox.app"
          zip -qry "powerfox-${BASILISK_VERSION}-10.6-x86_64.zip" PowerFox.app

          # Also pick up the DMG if present (the standard macOS distribution format)
          DMG_SRC="$(find "$DIST_DIR" -maxdepth 1 -type f -name '*.dmg' 2>/dev/null | head -1)"
          if [ -n "$DMG_SRC" ]; then
            cp "$DMG_SRC" "powerfox-${BASILISK_VERSION}-10.6-x86_64.dmg"
            ls -la "powerfox-${BASILISK_VERSION}-10.6-x86_64.dmg"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: powerfox-10.6-x86_64
          path: |
            powerfox-*.zip
            powerfox-*.dmg
