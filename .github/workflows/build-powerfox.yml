name: Build PowerFox (startergo fork)

# Self-hosted CI on startergo/powerfox-browser.
# Targets Mac OS X 10.6 x86_64 only. Skips the private Jazzzny/powerfox-sdk,
# the PPC toolchain, FFmpeg, and the Snow Leopard libc++ fix script — none of
# them are needed to produce a testable 10.6 x86_64 PowerFox.app for the
# WebGL/GL fix in platform/gfx/gl/GLContext.cpp.

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-powerfox:
    runs-on: macos-26
    name: Build PowerFox 10.6 x86_64
    permissions:
      contents: read

    steps:
      - name: Checkout PowerFox superproject
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install yasm nasm

      - name: Install Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Locate oldest available macOS SDK
        id: sdk
        run: |
          set -e
          XC_SDKS="/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs"
          CLT_SDKS="/Library/Developer/CommandLineTools/SDKs"
          mkdir -p /tmp/sdks
          SDK_PATH=""
          # Prefer 10.6 if available
          for base in "$XC_SDKS" "$CLT_SDKS"; do
            if [ -d "$base/MacOSX10.6.sdk" ]; then
              SDK_PATH="$base/MacOSX10.6.sdk"
              break
            fi
          done
          if [ -n "$SDK_PATH" ]; then
            echo "Using 10.6 SDK at $SDK_PATH"
            echo "with_sdk=--with-macos-sdk=$SDK_PATH" >> "$GITHUB_OUTPUT"
            echo "macos_target=10.6" >> "$GITHUB_OUTPUT"
          else
            # Fall back to whatever Xcode ships; set deployment target to 10.6
            # so weak-linking handles the missing APIs at runtime.
            DEFAULT_SDK="$(xcrun --show-osx-sdk-path 2>/dev/null || true)"
            echo "10.6 SDK not found; falling back to $DEFAULT_SDK with --enable-macos-target=10.6"
            echo "with_sdk=" >> "$GITHUB_OUTPUT"
            echo "macos_target=10.6" >> "$GITHUB_OUTPUT"
          fi

      - name: Write .mozconfig
        run: |
          cat > .mozconfig <<EOF
          TARGET_CPU=x86_64
          CC="clang -arch \$TARGET_CPU"
          CXX="clang++ -arch \$TARGET_CPU"

          export HOST_CC="clang -arch \$TARGET_CPU"
          export HOST_CXX="clang++ -arch \$TARGET_CPU"

          RANLIB=ranlib
          AR=ar
          AS=\$CC
          LD=ld
          STRIP=strip
          OTOOL=otool
          export CC CXX HOST_CC HOST_CXX RANLIB AR AS LD STRIP OTOOL

          ac_add_options --target=x86_64-apple-darwin10.8.0
          ac_add_options --host=x86_64-apple-darwin
          ac_add_options --enable-macos-target=${{ steps.sdk.outputs.macos_target }}
          ${{ steps.sdk.outputs.with_sdk }}
          ac_add_options --enable-application=basilisk
          ac_add_options --disable-tests
          ac_add_options --enable-optimize=-O2
          ac_add_options --disable-debug
          ac_add_options --disable-crashreporter
          ac_add_options --disable-necko-wifi
          ac_add_options --disable-safe-browsing

          export MOZ_TELEMETRY_REPORTING=0
          export MOZ_ADDON_SIGNING=0
          export MOZ_REQUIRE_SIGNING=0
          EOF
          echo "===== .mozconfig ====="
          cat .mozconfig

      - name: Build
        env:
          # Run mach under Rosetta so host arch (x86_64) matches the target
          # arch. Without this, UXP's configure infers the host triple as
          # "arm-apple-darwin..." from the arm64 runner and clang falls back
          # to -arch armv4t, which the linker rejects.
          MACH_BUILD_PYTHON_NATIVE: "1"
        run: |
          arch -x86_64 ./mach build
          arch -x86_64 ./mach package
          echo "BASILISK_VERSION=nightly-$(git rev-parse --short HEAD)-$(date +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Zip PowerFox.app
        run: |
          APP_PATH="obj-x86_64-apple-darwin/dist/powerfox/PowerFox.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "##[error]$APP_PATH not found"
            ls -la obj-x86_64-apple-darwin/dist/ 2>&1 | head -20
            exit 1
          fi
          cp -R "$APP_PATH" .
          zip -qry "powerfox-${BASILISK_VERSION}-10.6-x86_64.zip" PowerFox.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: powerfox-10.6-x86_64
          path: powerfox-*.zip
