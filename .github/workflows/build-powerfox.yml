name: Build PowerFox

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        default: 'nightly'
        options:
          - nightly
          - release
      version:
        description: 'Version Number'
        required: false
        type: string
      tag_name:
        description: 'Tag Name'
        required: false
        type: string
  push:
    branches: [ "main" ]

jobs:
  build-tiger:
    runs-on: macos-26
    strategy:
      matrix:
        arch: [g3, g4, g4e, g5, i386]
        include:
          - arch: g3
            target: powerpc
          - arch: g4
            target: powerpc
          - arch: g4e
            target: powerpc
          - arch: g5
            target: powerpc
          - arch: i386
            target: i386
    permissions:
      contents: read

    steps:
      - name: Checkout PowerFox SDK
        env:
            GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          git clone --depth 1 --single-branch --progress https://oauth2:${GITHUB_TOKEN}@github.com/Jazzzny/powerfox-sdk.git

      - name: Install SDK
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          gh release download 2.0 -p "gcc-powerpc.zip" --repo Jazzzny/powerfox-sdk
          sudo mkdir -p /opt/gcc-powerpc
          sudo unzip -q gcc-powerpc.zip -d /opt

      - name: Install dependencies
        run: brew install yasm pyenv

      - name: Install Python 2.7
        run: |
          pyenv install 2.7.18
          pyenv global 2.7.18

      - name: Clone PowerFox source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 --single-branch --progress https://github.com/Jazzzny/powerfox-browser.git
          cd powerfox-browser
          git clone --depth 1 --single-branch --progress --branch tiger "https://oauth2:${GITHUB_TOKEN}@github.com/Jazzzny/platform-uxp.git" platform

      - name: Build PowerFox
        run: |
          cp powerfox-sdk/.mozconfig-${{ matrix.arch }}-tiger powerfox-browser/.mozconfig
          cd powerfox-browser
          export PATH="/opt/gcc-powerpc/bin:$(pyenv root)/shims:${PATH}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.build_type }}" = "release" ]; then
            VERSION_STRING="${{ inputs.version }}-${{ matrix.arch }}-tiger-beta"
          else
            VERSION_STRING="nightly-$(git rev-parse --short HEAD)-$(date +%Y%m%d)"
          fi

          echo "BUILD_TYPE=$VERSION_STRING" >> $GITHUB_ENV
          export BASILISK_VERSION=${{ inputs.version }}

          ./mach build
          ./mach package

      - name: Copy FFmpeg libraries
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          gh release download tiger-ffmpeg-6.1.4 -p "ffmpeg-${{ matrix.arch }}.zip" --repo Jazzzny/powerfox-ffmpeg-enabler
          unzip -q "ffmpeg-${{ matrix.arch }}.zip" -d powerfox-browser/obj-${{ matrix.target }}-apple-darwin/dist/powerfox/PowerFox.app/Contents/MacOS/

      - name: Upload PowerFox Artifact
        uses: actions/upload-artifact@v7
        with:
          name: powerfox-${{ env.BUILD_TYPE }}-${{ matrix.arch }}
          path: powerfox-browser/obj-${{ matrix.target }}-apple-darwin/dist/powerfox/

  create-release:
    needs: build-tiger
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: PowerFox ${{ inputs.version }}
          draft: true
          token: ${{ secrets.REPO_TOKEN }}
          files: ./artifacts/powerfox-*.zip